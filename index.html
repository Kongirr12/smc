  <script>
    function handleLogoError(imgEl, iconId, containerId) {
      const driveBackup = 'https://lh3.googleusercontent.com/d/19aXvolxpVK5GndtRSMFP6sEdl7oa5PzN';
      if (imgEl.src !== driveBackup && !imgEl.dataset.failedBackup) {
        imgEl.dataset.failedBackup = 'true';
        imgEl.src = driveBackup;
      } else {
        imgEl.style.display = 'none';
        const iconEl = document.getElementById(iconId);
        if (iconEl) {
          iconEl.style.display = 'block';
        }
        if (containerId) {
          const containerEl = document.getElementById(containerId);
          if (containerEl) {
            containerEl.classList.remove('has-image');
          }
        }
      }
    }
  </script>
